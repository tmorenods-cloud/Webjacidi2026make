name: Sync Figma Make to Production

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Import Cleaning Script
        run: node scripts/clean-imports.cjs

      - name: Commit and Push to Production Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create and switch to production branch based on the current cleaned state
          git checkout -B production
          
          # Stage all changes (includes the clean App.tsx and the scripts/workflows)
          git add -A
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to sync to production branch."
          else
            git commit -m "chore: sync figma make updates with clean image assets [skip ci]"
            # Force push the production branch to origin
            git push origin production --force
          fi
